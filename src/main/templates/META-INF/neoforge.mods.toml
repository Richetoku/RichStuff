modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Richetoku / RikumiMita, converted from KubeJS by ChatGPT"
description='''
RichStuff converts the original KubeJS processing, storage, food jars/jugs, machines, molds, Create recipes, Pam integration, tags, and quests into a NeoForge mod for Minecraft 1.21.1.
Ore blocks and ore world generation are intentionally split into the sibling AllTheOres mod.
'''
[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"
[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"
[[dependencies.${mod_id}]]
modId="alltheores"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="create"
type="required"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="pamhc2foodcore"
type="required"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="pamhc2crops"
type="required"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="pamhc2trees"
type="required"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="createvintageneoforged"
type="optional"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="silentgear"
type="optional"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="silentgems"
type="optional"
ordering="AFTER"
side="BOTH"
[[dependencies.${mod_id}]]
modId="ftbquests"
type="optional"
ordering="AFTER"
side="BOTH"
